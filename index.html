<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zoltar & the Prophets | AI Fortune Teller Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 以實現存檔功能 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f1d592;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            background-color: var(--dark-bg);
            color: #e5e7eb;
            font-family: 'Noto Serif TC', serif;
            overflow: hidden;
            height: 100vh;
            height: -webkit-fill-available;
        }
        .special-font { font-family: 'Orbitron', sans-serif; }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .zoltar-cabinet {
            border: 8px double var(--gold);
            position: relative;
        }
        .zoltar-cabinet::before {
            content: "";
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 20px solid var(--gold);
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.5); }
        }
        .pulse-active { animation: pulse-gold 3s infinite; }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(212, 175, 55, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        @keyframes card-out {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .print-animation { animation: card-out 2s ease-out forwards; }

        .oracle-img-container {
            width: 100%;
            height: 120px;
            background-size: cover;
            background-position: center 20%;
            border-radius: 8px;
            margin-bottom: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.3);
            transition: filter 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
        }

        .mic-wave {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            height: 12px;
        }
        .mic-wave span {
            width: 2px;
            height: 100%;
            background: var(--gold);
            animation: wave 1s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { height: 40%; }
            50% { height: 100%; }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            <!--Vida gap: 8px;  -->
        }

        .oracle-card-disabled {
            cursor: not-allowed !important;
            filter: grayscale(1);
            opacity: 0.5;
        }

		/* 確保卡片容器定位與溢出控制 */
		.gold-card-base {
			position: relative; /* 必要：讓底部資訊能相對於它定位 */
			width: 240px;
			height: 380px;
			display: flex;
			flex-direction: column;
			padding: 10px 14px;
			box-sizing: border-box;
			overflow: hidden; /* 確保內容太長時不會撐開卡片 */
		}

		/* 新增：中間內容的包裝層，用來跟底部隔離 */
		.card-main-content {
			flex: 1;
			display: flex;
			flex-direction: column;
			margin-bottom: 40px; /* 重要：留出空間給底部的固定資訊，防止重疊 */
			overflow: hidden;
		}

		/* 修改：底部資訊改為絕對定位 */
		.card-footer-fixed {
			position: absolute;
			bottom: 12px;
			left: 14px;
			right: 14px;
			height: 32px;
			border-top: 1px dotted currentColor;
			display: flex;
			justify-content: space-between;
			align-items: flex-end;
			padding-top: 4px;
			background: transparent;
		}
		
        /* 1. Zoltar: 復古嘉年華 */
        .style-zoltar {
            background: linear-gradient(135deg, #4a1a1a 0%, #2a0a0a 100%);
            border: 4px solid #d4af37;
            color: #f1d592;
        }
        .style-zoltar .card-inner { border: 2px dashed #d4af37; padding: 10px; height: 100%; }
        .style-zoltar .card-title { font-family: 'Orbitron'; color: #ff0000; text-shadow: 0 0 5px #ff0000; font-size: 14px; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #d4af37; padding-bottom: 10px; /* 向上移動感，增加與線的距離 */}

        /* 2. 祭司: 古文明泥板 */
        .style-priest {
            background: #d2b48c; /* 沙色背景 */
            background-image: radial-gradient(circle, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            border: 6px solid #8b4513;
            color: #3e2723;
            border-radius: 4px;
        }
        .style-priest .card-inner { 
			/* 移除背景點狀裝飾，確保色彩一致 */
			background: transparent !important;
			border: 1px solid rgba(0,0,0,0.2); 
			height: 100%; 
			box-shadow: none !important; /* 陰影有時也會導致截圖色偏 */
		}
		.style-priest .card-title { font-weight: bold; text-align: center; letter-spacing: 0.2em; border-bottom: 2px solid #8b4513; margin-bottom: 10px; padding-bottom: 10px; /* 向上移動感，增加與線的距離 */}

		/* 3. 李淳風: 中式水墨宣紙 - 修正版：標題置中 */
		.style-li {
			background: #f4f1ea !important;
			border: 2px solid #222;
			color: #111 !important;
		}

		.style-li .card-inner { 
			border: 1px solid #222; 
			height: 100%; 
			padding: 10px;
			background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.03"><path d="M50 0 L100 50 L50 100 L0 50 Z" fill="black"/></svg>');
			display: flex;
			flex-direction: column;
		}

		/* 標題改為橫排、置中，位於圖片上方 */
		.style-li .card-title { 
			font-family: 'Noto Serif TC', serif; 
			font-weight: 900; 
			text-align: center;
			border-bottom: 2px solid #222; 
			margin-bottom: 8px; 
			padding-bottom: 10px;
			letter-spacing: 0.15em;
			font-size: 14px;
			position: static; /* 移除原本的 absolute */
			height: auto;     /* 移除原本固定的 120px */
			writing-mode: horizontal-tb; /* 確保為橫向 */
		}

		.style-li .card-summary-box { 
			padding-right: 0; /* 移除原本為了避開右側直書標題的間距 */
		}

		/* 讓圖片區域也帶有一點水墨邊界感 */
		.style-li #card-art-final {
			border: 1px solid #444;
			box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
		}
        /* 4. 先知: 賽博數位 */
        .style-oracle {
            background: #000;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            box-shadow: 0 0 20px #00f2ff55;
        }
        .style-oracle .card-inner { border: 1px solid #00f2ff33; height: 100%; position: relative; overflow: hidden; }
        .style-oracle .card-inner::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 242, 255, 0.05) 3px); pointer-events: none; }
        .style-oracle .card-title { font-family: 'Orbitron'; font-size: 10px; border: 1px solid #00f2ff; display: inline-block; padding: 2px 8px; margin-bottom: 10px; padding-bottom: 10px; /* 向上移動感，增加與線的距離 */}

        .stage-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
			scrollbar-width: none;
            <!--Vida webkit-overflow-scrolling: touch; -->
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4">

    <div id="main-frame" class="w-full max-w-2xl h-full max-h-[850px] zoltar-cabinet glass-panel rounded-t-3xl overflow-hidden flex flex-col items-center p-1 transition-all duration-700">
        <div class="scanline"></div>
        
        <div class="w-full text-center py-4 border-b border-yellow-900/30">
            <h1 class="special-font text-xl tracking-[0.5em] text-yellow-500">ZOLTAR & the PROPHETS</h1>
        </div>

        <div class="flex-1 w-full flex flex-col items-center p-4 relative overflow-hidden">
            
            <!-- Step 1: Initial -->
            <div id="step-1" class="text-center flex flex-col items-center justify-center h-full">
                <div class="relative mb-12">
                    <div class="w-40 h-40 rounded-full border-2 border-yellow-900/50 flex items-center justify-center pulse-active">
                        <span class="text-6xl">👁️</span>
                    </div>
                </div>
                <h2 class="text-lg mb-4 text-yellow-200">偵測到生命脈動...</h2>
                <button onclick="nextStep(2)" class="px-10 py-4 border border-yellow-600 text-yellow-500 hover:bg-yellow-600 hover:text-black transition-all font-bold tracking-widest">
                    觸碰螢幕開啟連結
                </button>
            </div>

            <!-- Step 2: Select Oracle 🔮🔱☯️📡-->
            <div id="step-2" class="hidden stage-container fade-in">
                <div class="bg-black/40 p-4 rounded-lg mb-4 border border-yellow-900/20">
                    <p id="hook-text" class="text-sm italic leading-relaxed text-yellow-100"></p>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button id="btn-zoltar" onclick="selectOracle('Zoltar')" disabled class="p-3 glass-panel text-left border border-orange-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-zoltar" class="loading-overlay"><span class="animate-pulse text-orange-400 text-[10px] tracking-widest">暖機中...</span></div>
                        <div id="img-zoltar" class="oracle-img-container border-orange-900/40 text-4xl" style="background-image: url('style-zoltar.png');"></div>
                        <h3 class="font-bold text-xs group-hover:text-orange-400 mb-1">Zoltar Original</h3>
                        <p class="text-[10px] text-orange-100/80 leading-tight">投下一枚硬幣，解鎖經典機械預言。</p>
                    </button>
                    <button id="btn-priest" onclick="selectOracle('祭司')" disabled class="p-3 glass-panel text-left border border-yellow-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-priest" class="loading-overlay"><span class="animate-pulse text-yellow-400 text-[10px] tracking-widest">呼喚中...</span></div>
                        <div id="img-priest" class="oracle-img-container text-4xl" style="background-image: url('style-priest.png');"></div>
                        <h3 class="font-bold text-xs group-hover:text-yellow-400 mb-1">蘇美爾祭司</h3>
                        <p class="text-[10px] text-yellow-100/80 leading-tight">跨越五千年文明，傳遞神祇的泥板啟示。</p>
                    </button>
                    <button id="btn-li" onclick="selectOracle('李淳風')" disabled class="p-3 glass-panel text-left border border-red-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-li" class="loading-overlay"><span class="animate-pulse text-red-400 text-[10px] tracking-widest">推背中...</span></div>
                        <div id="img-li" class="oracle-img-container border-red-900/40 text-4xl" style="background-image: url('style-li.png');"></div>
                        <h3 class="font-bold text-xs group-hover:text-red-400 mb-1">李淳風</h3>
                        <p class="text-[10px] text-red-100/80 leading-tight">觀星算數通今達古，推演大唐至未來的易理。</p>
                    </button>
                    <button id="btn-oracle" onclick="selectOracle('先知')" disabled class="p-3 glass-panel text-left border border-blue-900/40 group transition-all flex flex-col relative overflow-hidden oracle-card-disabled">
                        <div id="loading-oracle" class="loading-overlay"><span class="animate-pulse text-blue-400 text-[10px] tracking-widest">同步中...</span></div>
                        <div id="img-oracle" class="oracle-img-container border-blue-900/40 text-4xl" style="background-image: url('style-oracle.png');"></div>
                        <h3 class="font-bold text-xs group-hover:text-blue-300 mb-1">未來先知</h3>
                        <p class="text-[10px] text-blue-100/80 leading-tight">神經網絡運算中，精準掃描你潛意識的維度。</p>
                    </button>
                </div>
                <div class="text-center">
                    <p id="load-status" class="text-[10px] text-yellow-600 uppercase tracking-widest">招喚進行中...</p>
                </div>
            </div>

            <!-- Step 3: Payment -->
            <div id="step-3" class="hidden text-center flex flex-col items-center justify-center h-full fade-in">
                <h2 class="text-2xl mb-2 font-bold text-yellow-500">解鎖時空連結</h2>
                <div class="bg-white p-4 rounded-xl my-6">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ZoltarPayment" alt="QR Code" class="w-32 h-32 mb-4">
                    <button onclick="nextStep(4)" class="w-full px-8 py-3 bg-black text-yellow-500 border border-yellow-500 rounded-full text-sm font-bold">模擬支付成功</button>
                </div>
            </div>

            <!-- Step 4: Scenario Selection & Interaction -->
            <div id="step-4" class="hidden stage-container fade-in">
                <div class="flex items-center gap-4 mb-6 shrink-0 border-b border-yellow-900/20 pb-4">
                    <div class="w-14 h-14 rounded-full border-2 border-yellow-500 flex items-center justify-center overflow-hidden bg-black shadow-[0_0_15px_rgba(212,175,55,0.3)]">
                        <img id="oracle-avatar-img" src="" alt="Oracle" class="w-full h-full object-cover hidden">
                        <span id="oracle-avatar-fallback" class="text-2xl"></span>
                    </div>
                    <div>
                        <h3 id="oracle-name" class="text-lg font-bold text-yellow-400"></h3>
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] text-green-500 special-font">● CONNECTION STABLE</span>
                            <div class="mic-wave"><span></span><span></span><span></span></div>
                        </div>
                    </div>
                </div>

                <div id="interaction-stage-1" class="flex flex-col gap-4">
                    <p id="dimension-guide" class="text-sm text-yellow-100/90 mb-2 italic leading-relaxed"></p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <button onclick="prepareInput('career', '💼 職業轉折')" class="p-5 bg-yellow-900/10 border border-yellow-900/40 rounded-xl text-sm hover:bg-yellow-900/30 text-left transition-all flex items-center justify-between group shadow-sm">
                            <span class="font-bold">💼 職業轉折</span>
                            <span class="opacity-0 group-hover:opacity-100 transition-opacity">➔</span>
                        </button>
                        <button onclick="prepareInput('creation', '✍️ 創作靈魂')" class="p-5 bg-yellow-900/10 border border-yellow-900/40 rounded-xl text-sm hover:bg-yellow-900/30 text-left transition-all flex items-center justify-between group shadow-sm">
                            <span class="font-bold">✍️ 創作靈魂</span>
                            <span class="opacity-0 group-hover:opacity-100 transition-opacity">➔</span>
                        </button>
                        <button onclick="prepareInput('property', '🏠 大地預兆')" class="p-5 bg-yellow-900/10 border border-yellow-900/40 rounded-xl text-sm hover:bg-yellow-900/30 text-left transition-all flex items-center justify-between group shadow-sm">
                            <span class="font-bold">🏠 大地預兆</span>
                            <span class="opacity-0 group-hover:opacity-100 transition-opacity">➔</span>
                        </button>
                        <button onclick="prepareInput('other', '🌀 跨維自我')" class="p-5 bg-yellow-900/10 border border-yellow-900/40 rounded-xl text-sm hover:bg-yellow-900/30 text-left transition-all flex items-center justify-between group shadow-sm">
                            <span class="font-bold">🌀 跨維自我</span>
                            <span class="opacity-0 group-hover:opacity-100 transition-opacity">➔</span>
                        </button>
                    </div>
                </div>

                <div id="interaction-stage-2" class="hidden flex-1 flex flex-col gap-4">
                    <div class="flex-1 bg-black/60 border border-yellow-900/30 rounded-xl p-6 flex flex-col items-center text-center overflow-y-auto min-h-[250px]">
                        <div id="mic-status" class="mb-4 shrink-0">
                            <div class="w-12 h-12 bg-red-600/20 rounded-full flex items-center justify-center animate-pulse border border-red-500 mx-auto">
                                <span class="text-xl">🎙️</span>
                            </div>
                            <p class="text-[10px] text-red-400 mt-2 font-bold tracking-widest">LISTENING...</p>
                        </div>
                        <div id="persona-chat-container"></div>
                        <h4 id="input-prompt-title" class="text-lg text-yellow-500 mb-2 shrink-0 font-bold"></h4>
                        <textarea id="user-input-text" class="w-full bg-transparent border-b border-yellow-900/50 focus:border-yellow-500 outline-none text-center text-base py-2 resize-none min-h-[80px] placeholder-yellow-600/30 text-yellow-100" placeholder="（請訴說您的疑惑...）"></textarea>
                    </div>
                    <div class="pb-4 shrink-0">
                        <button onclick="confirmInput()" class="w-full py-4 bg-yellow-600 text-black font-bold rounded-lg hover:bg-yellow-500 transition-all uppercase tracking-widest shadow-xl">
                            聆聽命運箴言 (Submit)
                        </button>
                    </div>
                </div>

                <div id="interaction-stage-3" class="hidden flex-1 flex flex-col justify-center items-center text-center">
                    <div class="relative w-24 h-24 mb-6">
                        <div class="absolute inset-0 border-4 border-yellow-500/10 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-t-yellow-500 rounded-full animate-spin"></div>
                        <div class="absolute inset-0 flex items-center justify-center text-3xl">🔮</div>
                    </div>
                    <p id="thinking-status" class="text-yellow-400 animate-pulse text-sm font-bold tracking-widest">正在撥開時空的迷霧...</p>
                </div>
            </div>

            <!-- Step 5: Result -->
            <div id="step-5" class="hidden stage-container fade-in">
                <h2 class="text-lg mb-4 font-bold text-yellow-500 text-center tracking-widest">預言已經揭示</h2>
                <div class="bg-yellow-900/10 border border-yellow-900/40 p-5 rounded-xl mb-6 flex flex-col items-center shadow-inner">
                    <div id="result-art-preview" class="w-full h-48 bg-black/40 rounded-lg mb-4 bg-center bg-cover border border-yellow-900/30 flex items-center justify-center overflow-hidden">
                        <span id="image-load-indicator" class="text-xs text-yellow-600 animate-pulse">正在顯影...</span>
                    </div>
                    <p id="summary-content" class="italic text-yellow-100 text-sm leading-relaxed text-center"></p>
                </div>
                <button onclick="startPrinting()" class="w-full py-4 bg-yellow-600 text-black font-bold rounded-lg hover:bg-yellow-500 transition-all shadow-lg tracking-widest">取得專屬命運小卡 (PRINT|DOWNLOAD)</button>
            </div>

            <!-- Step 6: Printing -->
            <div id="step-6" class="hidden stage-container flex flex-col justify-between h-full fade-in overflow-hidden">
                <div id="print-view-box" class="flex-1 flex flex-col items-center justify-center py-2 overflow-hidden">
                    <div class="mb-2 special-font text-yellow-500 text-[10px] tracking-widest animate-pulse uppercase">Printing Fate...</div>
					<div id="fate-card-capture" class="gold-card-base print-animation shrink-0">
						<div class="card-main-content">
							<div class="card-title text-center font-bold text-xs mb-1 border-b border-current pb-1" id="card-main-title">PROPHECY</div>
							
							<div id="card-art-final" class="w-full bg-gray-200 mb-2 overflow-hidden flex-shrink-0" style="height: 140px;">
								<img src="" id="capture-image-src" class="w-full h-full object-cover">
							</div>
							<div class="text-[9px] font-bold uppercase mb-1" id="card-topic-label"></div>
							<div id="card-summary" class="italic font-serif" style="display: block; height: 130px; overflow: hidden; font-size: 8pt; line-height: 1.4; text-align: justify;"></div>
							<!--
							#前一版堪用
							<div id="card-summary" class="italic font-serif" style="display: block; width: 100%; min-height: 100px; font-size: 9pt; line-height: 1.5; overflow: hidden;"></div>
							#自己控制，不透過script
							<div id="card-summary" class="text-[8px] leading-tight italic font-serif" style="display: -webkit-box; -webkit-line-clamp: 10; -webkit-box-orient: vertical; overflow: hidden;"></div>
							-->
						</div>

						<div class="card-footer-fixed opacity-70">
							<div class="text-[6px] font-mono leading-none">
								ID: <span id="card-session-id"></span><br>
								<span class="mt-0.5 inline-block">DATE: <span id="card-date"></span></span>
							</div>
							<div class="text-lg leading-none" id="card-oracle-icon"></div>
						</div>
					</div>
                </div>
                
                <!-- 控制面版改為相對佈局，收縮間距 -->
                <div id="print-finished" class="hidden fade-in w-full bg-black/60 backdrop-blur-md p-4 border-t border-yellow-600/30 rounded-t-2xl mb-2">
                    <h3 class="text-yellow-500 font-bold text-center text-xs mb-3">專屬命運之卡已產生。</h3>
                    <div class="flex gap-2">
                        <button onclick="downloadCard()" id="download-btn" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-lg text-xs shadow-lg active:scale-95 transition-transform">

		function downloadCard() {
            const card = document.getElementById('fate-card-capture');
            const btn = document.getElementById('download-btn');
            btn.innerText = "生成高清檔中...";
            btn.disabled = true;

            // 獲取目前的樣式類別，以便在 onclone 中強化背景
            const currentStyle = Array.from(card.classList).find(c => c.startsWith('style-'));

            html2canvas(card, {
                scale: 4,
                useCORS: true,
                backgroundColor: "#ffffff", // 強制截圖背景為白色，防止黑色滲漏
                logging: false,
				width: card.offsetWidth,
				height: card.offsetHeight,
                onclone: (clonedDoc) => {
                    const clonedCard = clonedDoc.getElementById('fate-card-capture');
                    // 1. 徹底移除克隆體的動畫與濾鏡
                    clonedCard.style.transform = "none";
                    clonedCard.style.animation = "none";
                    clonedCard.style.filter = "none";
                    clonedCard.style.backdropFilter = "none";
                    clonedCard.style.boxShadow = "none";
                    
                    // 2. 強化克隆體的背景不透明度
                    // 根據不同的卡片風格，強制設定對應的不透明背景顏色
                    if (currentStyle === 'style-zoltar') clonedCard.style.background = "#2a0a0a";
                    else if (currentStyle === 'style-priest') clonedCard.style.background = "#d2b48c";
                    else if (currentStyle === 'style-li') clonedCard.style.background = "#f4f1ea";
                    else if (currentStyle === 'style-oracle') clonedCard.style.background = "#000000";
                    else clonedCard.style.background = "#ffffff";
                    
                    // 3. 隱藏克隆體以外的所有父元素，確保環境乾淨
                    const mainFrame = clonedDoc.getElementById('main-frame');
                    if (mainFrame) {
                        mainFrame.style.background = "transparent";
                        mainFrame.style.boxShadow = "none";
                        mainFrame.style.border = "none";
                        mainFrame.style.backdropFilter = "none";
                    }
					
					// 4. 額外保險：強制克隆後的底部也是絕對定位
					const footer = clonedCard.querySelector('.card-footer-fixed');
					if (footer) {
						footer.style.position = 'absolute';
						footer.style.bottom = '12px';
					}
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Zoltar_Fate_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                btn.innerText = "💾 取得命運卡";
                btn.disabled = false;
            }).catch(e => {
                console.error(e);
                btn.innerText = "出錯請重試";
                btn.disabled = false;
            });
		}
